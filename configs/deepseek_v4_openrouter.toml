[backend]
type = "openrouter"
model = "deepseek/deepseek-v4-pro"

[backend.auth]
env_var = "OPENROUTER_API_KEY"

[backend.params]
max_tokens = 8192
temperature = 0.0
timeout_s = 600
max_retries = 5
initial_backoff_s = 5.0
require_cache = true
cache_warmup_ticks = 2
provider_order = ["SiliconFlow"]

[engine]
low_watermark = 140000
high_watermark = 180000
max_consecutive_failures = 3
